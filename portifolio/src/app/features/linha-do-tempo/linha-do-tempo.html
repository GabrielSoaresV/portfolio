<section class="timeline" id="timeline">
  <div class="container">
    <div class="section-header">
      <span class="section-tag">Jornada</span>
      <h2 class="section-title">Linha do Tempo</h2>
      <p class="section-desc">Os marcos mais importantes da minha trajetória na tecnologia.</p>
    </div>
    <div class="timeline-wrapper">
      <div class="timeline-line"></div>
      <div class="timeline-items">
        <div class="timeline-item" *ngFor="let item of timelineItems; let i = index" [class.left]="i % 2 === 0" [class.right]="i % 2 !== 0">
          <div class="timeline-dot"></div>
          <div class="timeline-card">
            <span class="timeline-ano">{{ item.ano }}</span>
            <h3 class="timeline-titulo">{{ item.titulo }}</h3>
            <p class="timeline-desc">{{ item.descricao }}</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
