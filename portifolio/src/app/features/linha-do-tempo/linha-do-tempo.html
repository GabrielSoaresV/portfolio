<section class="timeline" id="timeline">
  <div class="container">
    <div class="section-header">
      <span class="section-tag animate-fade-in-up">Jornada</span>
      <h2 class="section-title animate-fade-in-up delay-1">Linha do Tempo</h2>
      <p class="section-desc animate-fade-in-up delay-2">Os marcos mais importantes da minha trajetória na tecnologia.</p>
    </div>
    <div class="timeline-wrapper" [class.collapsed]="!expandido">
      <div class="timeline-line"></div>
      <div class="timeline-items">
        <div class="timeline-item animate-fade-in-up" *ngFor="let item of timelineItems; let i = index" [class.left]="i % 2 === 0" [class.right]="i % 2 !== 0" [style.animationDelay]="(i * 0.12 + 0.2) + 's'">
          <div class="timeline-dot"></div>
          <div class="timeline-card">
            <span class="timeline-ano">{{ item.ano }}</span>
            <h3 class="timeline-titulo">{{ item.titulo }}</h3>
            <p class="timeline-desc">{{ item.descricao }}</p>
          </div>
        </div>
      </div>
    </div>

    <div class="mobile-toggle" (click)="toggle()">
      <span>{{ expandido ? 'Minimizar' : 'Expandir' }} timeline</span>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" [class.rotated]="expandido">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </div>
  </div>
</section>
